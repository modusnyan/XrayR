name: Test and validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './.git/*' -not -path './.claude/*'))"
      - name: Unit tests
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Validate configuration templates
        run: |
          go run . config check -c release/config/config.minimal.yml
          go run . config check -c release/config/config.yml.example
          go run . config check -c release/config/config.full.yml

  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
      - name: Compile integration tests
        run: go test -run '^$' -tags=integration ./...
